version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: job
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    restart: always
    command: redis-server --requirepass admin --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    depends_on:
      - postgres
      - redis
    ports:
      - "8080-8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job
      SPRING_DATASOURCE_USERNAME:
      SPRING_DATASOURCE_PASSWORD:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD:


volumes:
  pgdata:
  redisdata:
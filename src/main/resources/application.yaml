spring:
  application:
    name: task-scheduler

  jpa:
    hibernate:
      ddl-auto: update

  datasource:
    url: jdbc:postgresql://localhost:5433/job
    username:
    password:

  redis:
    host: localhost
    port: 6379
    password: admin

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true